    <script>
      window.addEventListener('error', function(e) {
        var diagnostics = document.getElementById('error-diagnostics') || document.createElement('div');
        diagnostics.id = 'error-diagnostics';
        diagnostics.style = 'position:fixed;bottom:20px;left:20px;right:20px;background:#7f1d1d;color:#fef2f2;padding:15px;border-radius:8px;z-index:999999;font-family:monospace;font-size:12px;max-height:50vh;overflow:auto;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);border:1px solid #f87171;';
        diagnostics.innerHTML += '<div><strong>[Error]:</strong> ' + e.message + '<br><small>' + e.filename + ':' + e.lineno + '</small></div>';
        document.body.appendChild(diagnostics);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var diagnostics = document.getElementById('error-diagnostics') || document.createElement('div');
        diagnostics.id = 'error-diagnostics';
        diagnostics.style = 'position:fixed;bottom:20px;left:20px;right:20px;background:#7f1d1d;color:#fef2f2;padding:15px;border-radius:8px;z-index:999999;font-family:monospace;font-size:12px;max-height:50vh;overflow:auto;box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);border:1px solid #f87171;';
        diagnostics.innerHTML += '<div><strong>[Promise Rejection]:</strong> ' + (e.reason ? (e.reason.message || e.reason) : 'No reason') + '</div>';
        document.body.appendChild(diagnostics);
      });
    </script>

    <script>
      // AGGRESSIVE ZOOM BLOCKER
      
      // 1. Block Pinch-to-Zoom (iOS Safari)
      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
      });

      document.addEventListener('gesturechange', function(e) {
        e.preventDefault();
      });

      document.addEventListener('gestureend', function(e) {
        e.preventDefault();
      });

      // 2. Block Ctrl + Wheel (Desktop/Trackpad Zoom)
      document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) {
          e.preventDefault();
        }
      }, { passive: false });

      // 3. Block Double-Tap Zoom (Legacy Mobile)
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);

      // 4. Prevent Keyboard Zoom
      document.addEventListener('keydown', function(event) {
        if ((event.ctrlKey || event.metaKey) && (event.key === '+' || event.key === '-' || event.key === '=')) {
          event.preventDefault();
        }
      });
    </script>
